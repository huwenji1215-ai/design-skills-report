// ─────────────────────────────────────────────
// LAYOUT CONFIG
// ─────────────────────────────────────────────
const ROOT_X = 1200, ROOT_Y = 780;

const BRANCH_CONFIG = {
  "ui":   { angle: -72,  spread: 200, dist: 260 },
  "img":  { angle: -144, spread: 220, dist: 260 },
  "vid":  { angle: 144,  spread: 220, dist: 260 },
  "doc":  { angle: 72,   spread: 200, dist: 260 },
  "eval": { angle: 0,    spread: 200, dist: 260 }
};

const GROUP_DIST    = 200;
const LEAF_DIST     = 195;
const LEAF_SPREAD   = 58;

// ─────────────────────────────────────────────
// NODE DIMENSIONS
// ─────────────────────────────────────────────
function getNodeSize(node) {
  if (node.id === "root") return { w: 160, h: 56, r: 12 };
  if (["ui","img","vid"].includes(node.id)) return { w: 140, h: 46, r: 10 };
  if (node.children && node.children.length > 0) return { w: 130, h: 40, r: 8 };
  return { w: 148, h: 44, r: 8 };
}

// ─────────────────────────────────────────────
// PRIORITY COLORS
// ─────────────────────────────────────────────
const P_BG    = { P0: "#3d1a1a", P1: "#1a2d3d", P2: "#1e1e1e", PoC: "#122310" };
const P_BORDER= { P0: "#da3633", P1: "#388bfd", P2: "#484f58", PoC: "#3fb950" };
const P_TEXT  = { P0: "#ff7b72", P1: "#79c0ff", P2: "#8b949e", PoC: "#56d364" };

// ─────────────────────────────────────────────
// POSITION CALCULATION
// ─────────────────────────────────────────────
function calcPositions() {
  const pos = {};
  pos["root"] = { x: ROOT_X, y: ROOT_Y };

  data.children.forEach(branch => {
    const cfg = BRANCH_CONFIG[branch.id];
    const bx = ROOT_X + cfg.dist * Math.cos(cfg.angle * Math.PI / 180);
    const by = ROOT_Y + cfg.dist * Math.sin(cfg.angle * Math.PI / 180);
    pos[branch.id] = { x: bx, y: by };

    const groups = branch.children;
    const total = groups.length;
    const halfSpread = (total - 1) * cfg.spread / 2;

    groups.forEach((grp, gi) => {
      const perpAngle = (cfg.angle + 90) * Math.PI / 180;
      const offset = gi * cfg.spread - halfSpread;
      const gx = bx + Math.cos(cfg.angle * Math.PI / 180) * GROUP_DIST + Math.cos(perpAngle) * offset;
      const gy = by + Math.sin(cfg.angle * Math.PI / 180) * GROUP_DIST + Math.sin(perpAngle) * offset;
      pos[grp.id] = { x: gx, y: gy };

      const leaves = grp.children || [];
      const lTotal = leaves.length;
      const lHalf = (lTotal - 1) * LEAF_SPREAD / 2;

      leaves.forEach((leaf, li) => {
        const lPerpAngle = perpAngle;
        const lOffset = li * LEAF_SPREAD - lHalf;
        const lx = gx + Math.cos(cfg.angle * Math.PI / 180) * LEAF_DIST + Math.cos(lPerpAngle) * lOffset;
        const ly = gy + Math.sin(cfg.angle * Math.PI / 180) * LEAF_DIST + Math.sin(lPerpAngle) * lOffset;
        pos[leaf.id] = { x: lx, y: ly };
      });
    });
  });
  return pos;
}

// ─────────────────────────────────────────────
// SVG RENDERING
// ─────────────────────────────────────────────
const svg = document.getElementById("svg-main");
const pos = calcPositions();

function makeSVGEl(tag, attrs) {
  const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function drawEdge(fromId, toId, cls) {
  const from = pos[fromId], to = pos[toId];
  const mid_x = (from.x + to.x) / 2;
  const path = makeSVGEl("path", {
    d: `M ${from.x} ${from.y} C ${mid_x} ${from.y}, ${mid_x} ${to.y}, ${to.x} ${to.y}`,
    class: `edge ${cls || "edge-root"}`
  });
  svg.appendChild(path);
}

function drawNode(node, p) {
  const { w, h, r } = getNodeSize(node);
  const isLeaf = !node.children || node.children.length === 0;
  const isRoot = node.id === "root";
  const isBranch = ["ui","img","vid","doc","eval"].includes(node.id);

  // Priority override colors for leaves
  let bg = node.bg || "#161b22";
  let border = node.border || "#30363d";
  let textColor = node.color || "#c9d1d9";
  if (isLeaf && node.priority) {
    bg = P_BG[node.priority] || bg;
    border = P_BORDER[node.priority] || border;
  }

  const g = makeSVGEl("g", {
    class: "node",
    transform: `translate(${p.x - w/2}, ${p.y - h/2})`
  });
  g.dataset.id = node.id;

  // Shadow
  if (isRoot || isBranch) {
    const defs = svg.querySelector("defs") || svg.insertBefore(makeSVGEl("defs", {}), svg.firstChild);
    const filterId = `shadow-${node.id}`;
    if (!document.getElementById(filterId)) {
      const filter = makeSVGEl("filter", { id: filterId, x: "-20%", y: "-20%", width: "140%", height: "140%" });
      const feDropShadow = makeSVGEl("feDropShadow", {
        dx: "0", dy: "2", stdDeviation: "4",
        "flood-color": border, "flood-opacity": "0.3"
      });
      filter.appendChild(feDropShadow);
      defs.appendChild(filter);
    }
  }

  const rect = makeSVGEl("rect", {
    width: w, height: h, rx: r,
    fill: bg, stroke: border,
    "stroke-width": isRoot ? 2.5 : isBranch ? 2 : 1.5,
    filter: (isRoot || isBranch) ? `url(#shadow-${node.id})` : ""
  });
  g.appendChild(rect);

  // Label
  const labelY = node.sub && !isLeaf ? h/2 - 7 : h/2 + 5;
  const text = makeSVGEl("text", {
    x: w/2, y: labelY,
    "text-anchor": "middle",
    fill: textColor,
    "font-size": isRoot ? 14 : isBranch ? 13 : isLeaf ? 12 : 12,
    "font-weight": isRoot || isBranch ? 700 : isLeaf ? 600 : 500,
    "font-family": "-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif"
  });
  text.textContent = node.label;
  g.appendChild(text);

  // Sub label
  if (node.sub) {
    const sub = makeSVGEl("text", {
      x: w/2, y: h/2 + 12,
      "text-anchor": "middle",
      fill: "#484f58",
      "font-size": 10,
      "font-family": "-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif"
    });
    sub.textContent = node.sub;
    g.appendChild(sub);
  }

  // Priority dot for leaves
  if (isLeaf && node.priority) {
    const dotColor = P_TEXT[node.priority];
    const dot = makeSVGEl("circle", {
      cx: w - 8, cy: 8, r: 4,
      fill: dotColor
    });
    g.appendChild(dot);
  }

  // Tooltip
  g.addEventListener("mouseenter", (e) => {
    if (!node.desc && !node.priority) return;
    const tip = document.getElementById("tooltip");
    const pTag = node.priority ? `<span class="tt-tag tt-${node.priority.toLowerCase()}">${node.priority}</span>` : "";
    const delClass = { yes: "tt-yes", warn: "tt-warn", no: "tt-no" }[node.deliverable] || "";
    const delText = { yes: "✅ 2天可交付", warn: "⚠️ 需评审", no: "❌ 需PoC" }[node.deliverable] || "";
    const delTag = delText ? `<span class="tt-tag ${delClass}">${delText}</span>` : "";
    tip.innerHTML = `
      <div class="tt-id">${node.id}</div>
      <div class="tt-name">${node.label}</div>
      ${node.desc ? `<div class="tt-desc">${node.desc}</div>` : ""}
      <div class="tt-row">
        ${pTag}
        ${delTag}
        ${node.tech ? `<span class="tt-tag" style="background:#21262d;color:#8b949e">⚙️ ${node.tech}</span>` : ""}
      </div>
      ${node.benchmark ? `<div style="margin-top:6px;font-size:11px;color:#484f58">🎯 对标：${node.benchmark}</div>` : ""}
    `;
    tip.style.display = "block";
    tip.style.left = (e.clientX + 16) + "px";
    tip.style.top  = (e.clientY - 10) + "px";
  });
  g.addEventListener("mousemove", (e) => {
    const tip = document.getElementById("tooltip");
    tip.style.left = (e.clientX + 16) + "px";
    tip.style.top  = (e.clientY - 10) + "px";
  });
  g.addEventListener("mouseleave", () => {
    document.getElementById("tooltip").style.display = "none";
  });

  svg.appendChild(g);
}

// ─────────────────────────────────────────────
// RENDER ALL
// ─────────────────────────────────────────────
function renderAll() {
  // Draw edges first (behind nodes)
  function drawEdgesRecursive(node) {
    (node.children || []).forEach(child => {
      drawEdge(node.id, child.id, child.edgeClass || node.edgeClass);
      drawEdgesRecursive(child);
    });
  }
  drawEdgesRecursive(data);

  // Draw nodes
  function drawNodesRecursive(node) {
    if (pos[node.id]) drawNode(node, pos[node.id]);
    (node.children || []).forEach(child => drawNodesRecursive(child));
  }
  drawNodesRecursive(data);
}

renderAll();

// ─────────────────────────────────────────────
// PAN & ZOOM
// ─────────────────────────────────────────────
const canvasWrap = document.getElementById("canvas-wrap");
const canvas = document.getElementById("canvas");
let scale = 0.48, tx = -380, ty = -290;

function applyTransform() {
  canvas.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
}
applyTransform();

let dragging = false, lastX, lastY;
canvasWrap.addEventListener("mousedown", e => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener("mouseup", () => { dragging = false; });
window.addEventListener("mousemove", e => {
  if (!dragging) return;
  tx += e.clientX - lastX; ty += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  applyTransform();
});
canvasWrap.addEventListener("wheel", e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.max(0.2, Math.min(2.5, scale * delta));
  const rect = canvasWrap.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;
  tx = mouseX - (mouseX - tx) * (newScale / scale);
  ty = mouseY - (mouseY - ty) * (newScale / scale);
  scale = newScale;
  applyTransform();
}, { passive: false });

document.getElementById("zoom-in").onclick = () => { scale = Math.min(2.5, scale * 1.15); applyTransform(); };
document.getElementById("zoom-out").onclick = () => { scale = Math.max(0.2, scale * 0.85); applyTransform(); };
document.getElementById("zoom-reset").onclick = () => { scale = 0.48; tx = -380; ty = -290; applyTransform(); };
</script>

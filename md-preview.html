<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设计Skill深度拆解 - 预览</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    line-height: 1.7;
  }
  #toolbar {
    position: sticky; top: 0; z-index: 100;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 12px 32px;
    display: flex; align-items: center; gap: 16px;
  }
  #toolbar h1 { font-size: 15px; color: #58a6ff; font-weight: 600; }
  #toolbar select {
    background: #21262d; border: 1px solid #30363d; color: #c9d1d9;
    padding: 4px 10px; border-radius: 6px; font-size: 13px; cursor: pointer;
  }
  #toolbar select:hover { border-color: #58a6ff; }
  #content {
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 32px 80px;
  }
  h1, h2, h3, h4 { color: #e6edf3; margin: 1.5em 0 0.6em; }
  h1 { font-size: 2em; border-bottom: 2px solid #21262d; padding-bottom: 0.3em; }
  h2 { font-size: 1.5em; border-bottom: 1px solid #21262d; padding-bottom: 0.3em; color: #58a6ff; }
  h3 { font-size: 1.2em; color: #79c0ff; }
  h4 { font-size: 1.05em; color: #d2a8ff; }
  p { margin: 0.6em 0; }
  a { color: #58a6ff; text-decoration: none; }
  a:hover { text-decoration: underline; }
  code {
    background: #161b22; border: 1px solid #30363d;
    padding: 2px 6px; border-radius: 4px;
    font-family: "SFMono-Regular", Consolas, monospace;
    font-size: 0.88em; color: #ff7b72;
  }
  pre {
    background: #161b22; border: 1px solid #30363d;
    border-radius: 8px; padding: 16px; overflow-x: auto;
    margin: 1em 0;
  }
  pre code { background: none; border: none; padding: 0; color: #e6edf3; font-size: 0.9em; }
  table {
    border-collapse: collapse; width: 100%;
    margin: 1em 0; font-size: 0.9em;
  }
  th {
    background: #21262d; color: #58a6ff;
    padding: 8px 12px; border: 1px solid #30363d;
    text-align: left; font-weight: 600;
  }
  td { padding: 7px 12px; border: 1px solid #30363d; }
  tr:nth-child(even) td { background: #161b22; }
  tr:hover td { background: #1c2740; }
  blockquote {
    border-left: 3px solid #58a6ff;
    margin: 1em 0; padding: 8px 16px;
    background: #161b22; border-radius: 0 6px 6px 0;
    color: #8b949e;
  }
  ul, ol { padding-left: 1.5em; margin: 0.5em 0; }
  li { margin: 0.25em 0; }
  hr { border: none; border-top: 1px solid #30363d; margin: 2em 0; }
  .loading { text-align: center; padding: 60px; color: #8b949e; font-size: 14px; }
</style>
</head>
<body>

<div id="toolbar">
  <h1>📄 MD 预览</h1>
  <select id="fileSelect" onchange="loadMd(this.value)">
    <option value="设计Skill深度拆解-三方向.md">设计Skill深度拆解-三方向.md</option>
    <option value="设计Skill逻辑拆解.md">设计Skill逻辑拆解.md</option>
    <option value="设计侧内容飞轮：构建 AI 驱动的生成-评审自进化引擎.md">设计侧内容飞轮.md</option>
  </select>
</div>

<div id="content"><div class="loading">加载中...</div></div>

<script>
async function loadMd(filename) {
  document.getElementById('content').innerHTML = '<div class="loading">加载中...</div>';
  try {
    const r = await fetch(encodeURIComponent(filename));
    const text = await r.text();
    document.getElementById('content').innerHTML = marked.parse(text);
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="loading">加载失败: ${e.message}</div>`;
  }
}
loadMd(document.getElementById('fileSelect').value);
</script>
</body>
</html>

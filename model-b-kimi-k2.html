<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>情绪记录App</title>
<meta name="viewport" content="width=390,initial-scale=1">
<style>
:root{
  --color-primary:#FF6B6B;
  --color-primary-light:#FF8E8E;
  --color-primary-dark:#E25656;
  --color-bg:#FFF8F5;
  --color-surface:#FFFFFF;
  --color-text:#2E2E2E;
  --color-text-secondary:#666666;
  --color-border:#FFE0E0;
  --radius:12px;
  --shadow:0 4px 12px rgba(255,107,107,.15);
  --transition:.25s ease;
  --spacing-xs:8px;
  --spacing-sm:16px;
  --spacing-md:24px;
  --spacing-lg:32px;
  --font-title:28px;
  --font-sub:16px;
  --font-body:14px;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif}
body{background:var(--color-bg);color:var(--color-text);width:390px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:var(--spacing-md)}
h1{font-size:var(--font-title);font-weight:600;margin-top:var(--spacing-lg);margin-bottom:var(--spacing-sm);text-align:center}
.mood-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--spacing-sm);width:100%;margin-bottom:var(--spacing-lg)}
.mood-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius);padding:var(--spacing-sm);display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform var(--transition),box-shadow var(--transition)}
.mood-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.mood-card:active{transform:translateY(0);box-shadow:none}
.emoji{font-size:36px;margin-bottom:var(--spacing-xs)}
.mood-name{font-size:var(--font-sub);font-weight:500;color:var(--color-text)}
.mood-desc{font-size:var(--font-body);color:var(--color-text-secondary);margin-top:4px;text-align:center}
.btn-primary{background:var(--color-primary);color:#fff;border:none;border-radius:var(--radius);padding:var(--spacing-sm) var(--spacing-lg);font-size:var(--font-sub);font-weight:600;cursor:pointer;transition:background var(--transition),transform var(--transition);width:100%;max-width:280px}
.btn-primary:hover{background:var(--color-primary-light)}
.btn-primary:active{background:var(--color-primary-dark);transform:scale(.98)}
</style>
</head>
<body>
<h1>今天感觉怎么样？</h1>
<div class="mood-grid">
  <div class="mood-card">
    <span class="emoji">😊</span>
    <div class="mood-name">开心</div>
    <div class="mood-desc">嘴角上扬</div>
  </div>
  <div class="mood-card">
    <span class="emoji">😌</span>
    <div class="mood-name">平静</div>
    <div class="mood-desc">心如止水</div>
  </div>
  <div class="mood-card">
    <span class="emoji">😰</span>
    <div class="mood-name">焦虑</div>
    <div class="mood-desc">坐立不安</div>
  </div>
  <div class="mood-card">
    <span class="emoji">😢</span>
    <div class="mood-name">悲伤</div>
    <div class="mood-desc">情绪低落</div>
  </div>
  <div class="mood-card">
    <span class="emoji">😡</span>
    <div class="mood-name">愤怒</div>
    <div class="mood-desc">怒火中烧</div>
  </div>
  <div class="mood-card">
    <span class="emoji">😲</span>
    <div class="mood-name">惊喜</div>
    <div class="mood-desc">出乎意料</div>
  </div>
</div>
<button class="btn-primary">记录心情</button>
</body>
</html>
```

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>部门评分监控 - 迭代 v3 (最终版)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .card {
    background: #1e293b;
    border-radius: 20px;
    padding: 40px 48px 36px;
    width: 960px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    border: 1px solid #334155;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 36px;
  }
  .title-block .main-title {
    font-size: 22px;
    font-weight: 700;
    color: #f1f5f9;
    letter-spacing: -0.3px;
  }
  .title-block .subtitle {
    font-size: 13px;
    color: #64748b;
    margin-top: 6px;
  }
  .badge-alert {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.4);
    border-radius: 10px;
    padding: 8px 16px;
    text-align: center;
  }
  .badge-alert .count {
    font-size: 28px;
    font-weight: 800;
    color: #ef4444;
    line-height: 1;
  }
  .badge-alert .label {
    font-size: 11px;
    color: #fca5a5;
    margin-top: 4px;
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 20px;
    margin-bottom: 28px;
    align-items: center;
  }
  .leg {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: #94a3b8;
  }
  .leg-dot { width: 12px; height: 12px; border-radius: 3px; }
  .leg-line {
    width: 20px; height: 2px;
    border-top: 2px dashed #f59e0b;
  }

  /* Chart */
  .chart-area {
    position: relative;
    padding-left: 48px;
    padding-bottom: 20px;
  }
  .y-axis {
    position: absolute;
    left: 0;
    bottom: 50px;
    height: 280px;
    display: flex;
    flex-direction: column-reverse;
    justify-content: space-between;
  }
  .y-tick {
    font-size: 11px;
    color: #475569;
    width: 30px;
    text-align: right;
  }
  .bars-zone {
    position: relative;
    height: 280px;
    margin-bottom: 20px;
  }

  /* threshold */
  .threshold-line {
    position: absolute;
    left: 0; right: 0;
    bottom: calc(3.5 / 5 * 280px);
    border-top: 2px dashed #f59e0b;
    z-index: 10;
  }
  .threshold-label {
    position: absolute;
    right: 0;
    top: -20px;
    font-size: 11px;
    font-weight: 600;
    color: #f59e0b;
    background: #1e293b;
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid rgba(245,158,11,0.5);
  }

  /* grid lines */
  .grid-line {
    position: absolute;
    left: 0; right: 0;
    border-top: 1px solid #1e3a5f20;
  }

  .bars-flex {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 100%;
    display: flex;
    align-items: flex-end;
    gap: 24px;
    padding: 0 8px;
  }
  .bar-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    height: 100%;
    position: relative;
  }
  .bar {
    width: 100%;
    max-width: 90px;
    border-radius: 7px 7px 0 0;
    position: relative;
  }

  /* alert chip */
  .chip-alert {
    position: absolute;
    top: -42px;
    left: 50%;
    transform: translateX(-50%);
    background: #ef4444;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(239,68,68,0.4);
  }

  .bar-score {
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 20px;
    font-weight: 800;
    white-space: nowrap;
  }
  .gap-label {
    position: absolute;
    top: -48px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    background: rgba(239,68,68,0.2);
    padding: 2px 7px;
    border-radius: 4px;
  }

  .bar-name {
    margin-top: 10px;
    font-size: 14px;
    color: #94a3b8;
    font-weight: 500;
  }

  /* Summary footer */
  .summary-row {
    display: flex;
    gap: 12px;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid #334155;
  }
  .sum-card {
    flex: 1;
    background: #0f172a;
    border-radius: 10px;
    padding: 14px 18px;
    border: 1px solid #334155;
  }
  .sum-card.danger { border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.06); }
  .sum-card.good { border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.05); }
  .sum-label { font-size: 11px; color: #64748b; margin-bottom: 4px; }
  .sum-value { font-size: 20px; font-weight: 700; }
  .sum-value.red { color: #ef4444; }
  .sum-value.green { color: #22c55e; }
  .sum-desc { font-size: 12px; color: #475569; margin-top: 4px; }
</style>
</head>
<body>
<div class="card">

  <!-- Header -->
  <div class="header">
    <div class="title-block">
      <div class="main-title">各部门 2024-Q1 服务评分监控</div>
      <div class="subtitle">数据周期：2024年第一季度 · 评分满分：5分 · 预警阈值：3.5分</div>
    </div>
    <div class="badge-alert">
      <div class="count">2/5</div>
      <div class="label">部门触发预警</div>
    </div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#ef4444;"></div>预警部门（评分 &lt; 3.5）</div>
    <div class="leg"><div class="leg-dot" style="background:#22c55e;"></div>正常部门（评分 ≥ 3.5）</div>
    <div class="leg"><div class="leg-line"></div>预警阈值线 3.5</div>
  </div>

  <!-- Chart -->
  <div class="chart-area">
    <div class="y-axis">
      <span class="y-tick">0</span>
      <span class="y-tick">1</span>
      <span class="y-tick">2</span>
      <span class="y-tick">3</span>
      <span class="y-tick">4</span>
      <span class="y-tick">5</span>
    </div>

    <div class="bars-zone">
      <!-- threshold -->
      <div class="threshold-line">
        <span class="threshold-label">预警线 3.5</span>
      </div>

      <div class="bars-flex">

        <!-- 电商 2.8 预警 -->
        <div class="bar-group">
          <span class="chip-alert">⚠ 预警</span>
          <div class="bar" style="height:calc(2.8/5*280px); background:#ef4444; position:relative;">
            <span class="bar-score" style="color:#fca5a5;">2.8</span>
          </div>
          <div class="bar-name">电商</div>
        </div>

        <!-- 物流 4.1 正常 -->
        <div class="bar-group">
          <div class="bar" style="height:calc(4.1/5*280px); background:#22c55e; position:relative;">
            <span class="bar-score" style="color:#bbf7d0;">4.1</span>
          </div>
          <div class="bar-name">物流</div>
        </div>

        <!-- 客服 3.2 预警 -->
        <div class="bar-group">
          <span class="chip-alert">⚠ 预警</span>
          <div class="bar" style="height:calc(3.2/5*280px); background:#ef4444; position:relative;">
            <span class="bar-score" style="color:#fca5a5;">3.2</span>
          </div>
          <div class="bar-name">客服</div>
        </div>

        <!-- 运营 4.7 正常 -->
        <div class="bar-group">
          <div class="bar" style="height:calc(4.7/5*280px); background:#22c55e; position:relative;">
            <span class="bar-score" style="color:#bbf7d0;">4.7</span>
          </div>
          <div class="bar-name">运营</div>
        </div>

        <!-- 技术 3.9 正常 -->
        <div class="bar-group">
          <div class="bar" style="height:calc(3.9/5*280px); background:#22c55e; position:relative;">
            <span class="bar-score" style="color:#bbf7d0;">3.9</span>
          </div>
          <div class="bar-name">技术</div>
        </div>

      </div>
    </div>
  </div>

  <!-- Summary -->
  <div class="summary-row">
    <div class="sum-card danger">
      <div class="sum-label">最低分部门</div>
      <div class="sum-value red">电商 2.8</div>
      <div class="sum-desc">低于阈值 −0.7，需重点关注</div>
    </div>
    <div class="sum-card danger">
      <div class="sum-label">预警部门</div>
      <div class="sum-value red">2 个</div>
      <div class="sum-desc">电商（2.8）、客服（3.2）</div>
    </div>
    <div class="sum-card good">
      <div class="sum-label">达标部门</div>
      <div class="sum-value green">3 个</div>
      <div class="sum-desc">物流、运营、技术均超过阈值</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">部门均分</div>
      <div class="sum-value" style="color:#94a3b8;">3.74</div>
      <div class="sum-desc">整体略高于预警线</div>
    </div>
  </div>

</div>
</body>
</html>

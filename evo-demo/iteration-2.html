<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>部门评分监控 - 迭代 v2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .chart-wrapper {
    background: #16213e;
    border-radius: 16px;
    padding: 40px 50px 50px;
    width: 900px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 32px;
  }
  .chart-title {
    font-size: 22px;
    font-weight: 700;
    color: #e2e8f0;
  }
  .chart-subtitle {
    font-size: 13px;
    color: #94a3b8;
    margin-top: 6px;
  }
  .legend {
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #94a3b8;
  }
  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 3px;
  }
  .chart-area {
    position: relative;
    padding-left: 55px;
  }
  .bars-container {
    position: relative;
    height: 300px;
  }
  /* threshold line */
  .threshold-line {
    position: absolute;
    left: 0; right: 0;
    border-top: 2px dashed #f59e0b;
    /* y=3.5, scale 0-5 → 3.5/5=70% from bottom */
    bottom: calc(3.5/5 * 270px + 30px);
    z-index: 10;
  }
  .threshold-label {
    position: absolute;
    right: 0;
    top: -20px;
    font-size: 12px;
    color: #f59e0b;
    font-weight: 600;
    background: #16213e;
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid #f59e0b;
  }
  .bars-row {
    position: absolute;
    bottom: 30px;
    left: 0; right: 0;
    height: 270px;
    display: flex;
    align-items: flex-end;
    gap: 28px;
  }
  .bar-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    height: 100%;
    position: relative;
  }
  .bar {
    width: 100%;
    border-radius: 6px 6px 0 0;
    position: relative;
  }
  .bar-value {
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 20px;
    font-weight: 700;
    white-space: nowrap;
  }
  .bar-label {
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    color: #94a3b8;
    white-space: nowrap;
  }
  .alert-badge {
    position: absolute;
    top: -54px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #fff;
    background: #ef4444;
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
  }
  .y-axis {
    position: absolute;
    left: -55px;
    bottom: 30px;
    height: 270px;
    display: flex;
    flex-direction: column-reverse;
    justify-content: space-between;
  }
  .y-tick {
    font-size: 12px;
    color: #475569;
    text-align: right;
    width: 30px;
  }
  .x-baseline {
    position: absolute;
    bottom: 30px;
    left: 0; right: 0;
    border-top: 1px solid #334155;
  }
</style>
</head>
<body>
<div class="chart-wrapper">
  <div class="chart-header">
    <div>
      <div class="chart-title">各部门 2024-Q1 服务评分</div>
      <div class="chart-subtitle">数据周期：2024年第一季度 | 预警阈值：3.5分</div>
    </div>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:#ef4444;"></div>
        预警 (&lt;3.5)
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#22c55e;"></div>
        正常 (≥3.5)
      </div>
      <div class="legend-item" style="color:#f59e0b;">
        ---- 阈值线 3.5
      </div>
    </div>
  </div>

  <div class="chart-area">
    <div class="y-axis">
      <span class="y-tick">0</span>
      <span class="y-tick">1</span>
      <span class="y-tick">2</span>
      <span class="y-tick">3</span>
      <span class="y-tick">4</span>
      <span class="y-tick">5</span>
    </div>

    <div class="bars-container">
      <!-- threshold line -->
      <div class="threshold-line">
        <span class="threshold-label">预警线 3.5</span>
      </div>
      <div class="x-baseline"></div>

      <div class="bars-row">
        <!-- 电商 2.8 → 预警 -->
        <div class="bar-group">
          <span class="alert-badge">⚠️ 预警</span>
          <div class="bar" style="height: calc(2.8/5 * 270px); background:linear-gradient(180deg,#ef4444,#dc2626);">
            <span class="bar-value" style="color:#fca5a5;">2.8</span>
          </div>
          <div class="bar-label">电商</div>
        </div>
        <!-- 物流 4.1 → 正常 -->
        <div class="bar-group">
          <div class="bar" style="height: calc(4.1/5 * 270px); background:linear-gradient(180deg,#22c55e,#16a34a);">
            <span class="bar-value" style="color:#bbf7d0;">4.1</span>
          </div>
          <div class="bar-label">物流</div>
        </div>
        <!-- 客服 3.2 → 预警 -->
        <div class="bar-group">
          <span class="alert-badge">⚠️ 预警</span>
          <div class="bar" style="height: calc(3.2/5 * 270px); background:linear-gradient(180deg,#ef4444,#dc2626);">
            <span class="bar-value" style="color:#fca5a5;">3.2</span>
          </div>
          <div class="bar-label">客服</div>
        </div>
        <!-- 运营 4.7 → 正常 -->
        <div class="bar-group">
          <div class="bar" style="height: calc(4.7/5 * 270px); background:linear-gradient(180deg,#22c55e,#16a34a);">
            <span class="bar-value" style="color:#bbf7d0;">4.7</span>
          </div>
          <div class="bar-label">运营</div>
        </div>
        <!-- 技术 3.9 → 正常 -->
        <div class="bar-group">
          <div class="bar" style="height: calc(3.9/5 * 270px); background:linear-gradient(180deg,#22c55e,#16a34a);">
            <span class="bar-value" style="color:#bbf7d0;">3.9</span>
          </div>
          <div class="bar-label">技术</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>情绪记录App</title>
    <style>
        :root {
            /* 8px Spacing System */
            --spacing-1: 8px;
            --spacing-2: 16px;
            --spacing-3: 24px;
            --spacing-4: 32px;
            --spacing-5: 40px;
            --spacing-6: 48px;

            /* Warm Color Palette */
            --color-primary: #D8432A; /* WCAG AA contrast against white is 4.7:1 */
            --color-primary-hover: #C23A23;
            --color-primary-active: #A8301B;
            --color-background: #FFF8F6;
            --color-surface: #FFFFFF;
            
            /* Text Colors (WCAG AA compliant) */
            --color-text-primary: #2C1E1B; 
            --color-text-secondary: #5E4D4A; 
            --color-text-tertiary: #8C7C79;
            
            /* Borders */
            --color-border: #EFE4E1;
            --color-border-active: #FFBDB3;
            
            /* Background for selected states */
            --color-selected-bg: #FFF1EE;

            /* Shadows */
            --shadow-sm: 0 2px 8px rgba(216, 67, 42, 0.06);
            --shadow-md: 0 8px 24px rgba(216, 67, 42, 0.12);
            --shadow-btn: 0 4px 16px rgba(216, 67, 42, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #EAEAEA; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 390px;
            height: 844px;
            background-color: var(--color-background);
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
        }

        header {
            padding: var(--spacing-6) var(--spacing-3) var(--spacing-3);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-1);
            line-height: 1.3;
        }

        .subtitle {
            font-size: 16px;
            font-weight: 500;
            color: var(--color-text-secondary);
            line-height: 1.5;
        }

        .emotions-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-2);
            padding: 0 var(--spacing-3) var(--spacing-3);
        }

        .emotion-card {
            background-color: var(--color-surface);
            border: 2px solid var(--color-border);
            border-radius: 16px;
            padding: var(--spacing-2) var(--spacing-1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
            user-select: none;
        }

        .emotion-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--color-border-active);
        }

        .emotion-card:active {
            transform: translateY(0);
        }

        .emotion-card.selected {
            background-color: var(--color-selected-bg);
            border-color: var(--color-primary);
        }

        .emoji {
            font-size: 32px;
            margin-bottom: var(--spacing-1);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .emotion-card:hover .emoji {
            transform: scale(1.15);
        }

        .emotion-card.selected .emoji {
            transform: scale(1.2) rotate(5deg);
        }

        .emotion-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text-secondary);
            transition: color 0.3s ease;
        }

        .emotion-card.selected .emotion-label {
            color: var(--color-primary);
        }

        .note-section {
            padding: 0 var(--spacing-3) var(--spacing-4);
            flex-grow: 1;
        }

        .note-desc {
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-1);
        }

        textarea {
            width: 100%;
            height: 120px;
            background-color: var(--color-surface);
            border: 2px solid var(--color-border);
            border-radius: 16px;
            padding: var(--spacing-2);
            font-size: 16px;
            color: var(--color-text-primary);
            resize: none;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
            line-height: 1.6;
        }

        textarea::placeholder {
            color: var(--color-text-tertiary);
        }

        textarea:hover {
            border-color: var(--color-border-active);
        }

        textarea:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: var(--shadow-md);
            background-color: var(--color-surface);
        }

        .button-container {
            padding: var(--spacing-3);
            background: linear-gradient(180deg, rgba(255,248,246,0) 0%, rgba(255,248,246,0.9) 30%, rgba(255,248,246,1) 100%);
            position: sticky;
            bottom: 0;
            z-index: 10;
        }

        .btn-primary {
            width: 100%;
            background-color: var(--color-primary);
            color: var(--color-surface);
            border: none;
            border-radius: 28px;
            height: 56px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-btn);
        }

        .btn-primary:hover {
            background-color: var(--color-primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(216, 67, 42, 0.35);
        }

        .btn-primary:active {
            background-color: var(--color-primary-active);
            transform: translateY(2px);
            box-shadow: 0 2px 8px rgba(216, 67, 42, 0.2);
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>今天感觉怎么样</h1>
        <p class="subtitle">记录当下的真实感受</p>
    </header>

    <main>
        <div class="emotions-grid">
            <div class="emotion-card selected" onclick="selectEmotion(this)">
                <div class="emoji">😊</div>
                <div class="emotion-label">开心</div>
            </div>
            <div class="emotion-card" onclick="selectEmotion(this)">
                <div class="emoji">😌</div>
                <div class="emotion-label">平静</div>
            </div>
            <div class="emotion-card" onclick="selectEmotion(this)">
                <div class="emoji">😰</div>
                <div class="emotion-label">焦虑</div>
            </div>
            <div class="emotion-card" onclick="selectEmotion(this)">
                <div class="emoji">😢</div>
                <div class="emotion-label">悲伤</div>
            </div>
            <div class="emotion-card" onclick="selectEmotion(this)">
                <div class="emoji">😡</div>
                <div class="emotion-label">愤怒</div>
            </div>
            <div class="emotion-card" onclick="selectEmotion(this)">
                <div class="emoji">🤩</div>
                <div class="emotion-label">惊喜</div>
            </div>
        </div>

        <div class="note-section">
            <div class="note-desc">简短文字描述</div>
            <textarea placeholder="发生了什么事情让你有这样的感受？"></textarea>
        </div>
    </main>

    <div class="button-container">
        <button class="btn-primary">记录心情</button>
    </div>
</div>

<script>
    function selectEmotion(element) {
        const cards = document.querySelectorAll('.emotion-card');
        cards.forEach(card => card.classList.remove('selected'));
        element.classList.add('selected');
    }
</script>

</body>
</html>

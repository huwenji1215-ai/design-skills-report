<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<title>Slide 06 — Closing</title><style>
:root {
  --bg: #050A14; --container: #0D1B2A; --container-2: #112233;
  --accent: #00D4FF; --accent-soft: rgba(0,212,255,0.12);
  --text-primary: #E8F4FD; --text-secondary: #7ECFEF; --text-muted: #4A90A4;
  --border: rgba(0,212,255,0.15);
  --shadow-1: 0 1px 6px rgba(0,212,255,0.10);
  --shadow-2: 0 4px 32px rgba(0,212,255,0.18);
  --shadow-3: 0 8px 56px rgba(0,212,255,0.30);
  --radius: 8px; --font: 'Inter','PingFang SC',sans-serif;
  --success:#22C55E; --warning:#F59E0B; --danger:#EF4444; --info:#3B82F6;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text-primary);
       width:1280px; height:720px; overflow:hidden; position:relative; }
.slide { width:1280px; height:720px; position:relative; overflow:hidden; }
.bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.mask { position:absolute; inset:0; }
.slide-num { position:absolute; right:32px; bottom:24px; font-size:12px;
             color:var(--text-muted); letter-spacing:2px; }

.bg-overlay { position:absolute; inset:0;
               background: linear-gradient(180deg, rgba(5,10,20,0.55) 0%, rgba(5,10,20,0.95) 100%); }
.content { position:relative; z-index:2; padding:56px 80px; height:100%;
            display:flex; flex-direction:column; justify-content:center; align-items:center;
            text-align:center; }
.eyebrow { font-size:11px; letter-spacing:4px; text-transform:uppercase;
            color:var(--accent); margin-bottom:16px; }
h2 { font-size:36px; font-weight:800; margin-bottom:8px;
      background: linear-gradient(135deg, #E8F4FD 0%, var(--accent) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.sub { font-size:15px; color:var(--text-secondary); margin-bottom:48px; letter-spacing:2px; }
.roadmap { display:flex; align-items:flex-start; gap:0; width:100%; max-width:900px; }
.step { flex:1; display:flex; flex-direction:column; align-items:center; gap:12px; position:relative; }
.step:not(:last-child)::after { content:''; position:absolute; top:24px; left:calc(50% + 32px);
  right:calc(-50% + 32px); height:2px;
  background: linear-gradient(90deg, var(--accent), rgba(0,212,255,0.2)); }
.step-icon { width:48px; height:48px; border-radius:50%; border:2px solid var(--accent);
              display:flex; align-items:center; justify-content:center;
              font-size:18px; background:var(--accent-soft); }
.step-time { font-size:11px; color:var(--accent); font-weight:700; letter-spacing:1px; }
.step-title { font-size:16px; font-weight:700; color:var(--text-primary); }
.step-desc { font-size:12px; color:var(--text-secondary); text-align:center; line-height:1.5; max-width:200px; }
.accent-line { position:absolute; top:0; left:0; width:100%; height:2px; z-index:3;
                background: linear-gradient(90deg, var(--accent), transparent); }
</style></head><body><div class="slide">

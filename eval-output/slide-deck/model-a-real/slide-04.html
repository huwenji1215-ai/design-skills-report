:root {
  --bg: #050A14; --container: #0D1B2A; --container-2: #112233;
  --accent: #00D4FF; --accent-soft: rgba(0,212,255,0.12);

  --border: rgba(0,212,255,0.15);

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text-primary);
       width:1280px; height:720px; overflow:hidden; position:relative; }
.slide { width:1280px; height:720px; position:relative; overflow:hidden; }
.bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.mask { position:absolute; inset:0; }
.slide-num { position:absolute; right:32px; bottom:24px; font-size:12px;
             color:var(--text-muted); letter-spacing:2px; }

.bg-overlay { position:absolute; inset:0;
               background: linear-gradient(135deg, rgba(5,10,20,0.92) 0%, rgba(5,10,20,0.75) 100%); }
.content { position:relative; z-index:2; padding:40px 80px; height:100%;
            display:grid; grid-template-rows:auto 1fr; gap:0; }
.header { padding-bottom:16px; }
.eyebrow { font-size:11px; letter-spacing:3px; text-transform:uppercase;
            color:var(--accent); margin-bottom:8px; }
h2 { font-size:28px; font-weight:700; margin-bottom:4px; }
.subtitle { font-size:13px; color:var(--text-secondary); }
#bubbleChart { width:100%; height:100%; }
.accent-line { position:absolute; top:0; left:0; width:100%; height:2px; z-index:3;
                background: linear-gradient(90deg, var(--accent), transparent); }
</style>

    <div class="eyebrow" contenteditable="true">Market Intelligence · Segment View</div>
    <h2 contenteditable="true">AI 赛道增速矩阵</h2>
    <div class="subtitle" contenteditable="true">规模（X轴）× 增速（Y轴）× 资本密度（气泡大小）— 2025年</div>
  </div>
  <div id="bubbleChart"></div>
</div>
<div class="slide-num">4 / 6</div>
</div>
<script>
var chart = echarts.init(document.getElementById('bubbleChart'));
chart.setOption({
  backgroundColor:'transparent',
  legend:{data:['AI赛道'],show:false},
  grid:{left:'8%',right:'5%',top:'5%',bottom:'12%'},
  xAxis:{name:'市场份额 %',nameLocation:'end',nameTextStyle:{color:'#7ECFEF',fontSize:11},
    type:'value',min:0,max:50,splitLine:{lineStyle:{color:'rgba(0,212,255,0.08)'}},
    axisLine:{lineStyle:{color:'rgba(0,212,255,0.3)'}},
    axisLabel:{color:'#7ECFEF',fontSize:11,formatter:v=>v+'%'}},
  yAxis:{name:'YoY 增速 %',nameLocation:'end',nameTextStyle:{color:'#7ECFEF',fontSize:11},
    type:'value',min:0,max:250,splitLine:{lineStyle:{color:'rgba(0,212,255,0.08)'}},
    axisLine:{lineStyle:{color:'rgba(0,212,255,0.3)'}},
    axisLabel:{color:'#7ECFEF',fontSize:11,formatter:v=>v+'%'}},
  tooltip:{formatter:p=>`<b style="color:#00D4FF">${p.data[3]}</b><br>市场份额: ${p.data[0]}%<br>增速: ${p.data[1]}%<br>资本密度指数: ${p.data[2]}`},
  series:[{
    type:'scatter',
    symbolSize: d => Math.sqrt(d[2])*5,
    data:[
      [38, 65, 180, '生成式AI', '#00D4FF'],
      [24, 213, 120, 'AI Agent', '#22C55E'],
      [18, 89, 90, '企业AI工具', '#F59E0B'],
      [12, 156, 60, '边缘AI', '#E040FB'],
      [8, 102, 42, 'AI基础设施', '#7ECFEF']
    ],
    itemStyle:{color: p => p.data[4], opacity:0.85},
    label:{show:true, formatter:p=>p.data[3],
      position:'top', color:'#E8F4FD', fontSize:11, fontWeight:600}
  }]
});
</script></body></html>

:root {

.content { position:relative; z-index:2; padding:36px 80px; height:100%;

.eyebrow { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--accent); margin-bottom:6px; }
h2 { font-size:26px; font-weight:700; margin-bottom:3px; font-family:'Georgia',serif; }
.subtitle { font-size:12px; color:var(--text-secondary); margin-bottom:8px; font-style:italic; }
#bubbleChart { width:100%; height:100%; }
.accent-line { position:absolute; top:0; left:0; width:100%; height:2px; z-index:3;

<title>Slide 04</title><style>
:root {
  --bg: #1A0F0F; --container: #2D1515; --container-2: #3D2020;
  --accent: #D4A574; --accent-soft: rgba(212,165,116,0.15);
  --text-primary: #FAF0E6; --text-secondary: #D4A574; --text-muted: #8B6B4F;
  --border: rgba(212,165,116,0.2);
  --shadow-1: 0 1px 6px rgba(212,165,116,0.10);
  --shadow-2: 0 4px 24px rgba(212,165,116,0.20);
  --shadow-3: 0 8px 40px rgba(212,165,116,0.32);
  --radius: 12px; --font: 'Georgia','PingFang SC',serif;
  --success:#22C55E; --warning:#F59E0B; --danger:#EF4444; --info:#3B82F6;

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text-primary);
       width:1280px; height:720px; overflow:hidden; position:relative; }
.slide { width:1280px; height:720px; position:relative; overflow:hidden; }
.bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.slide-num { position:absolute; right:32px; bottom:24px; font-size:12px;
             color:var(--text-muted); letter-spacing:2px; font-family:'Georgia',serif; }

.bg-overlay { position:absolute; inset:0; background:rgba(26,15,15,0.82); }
.content { position:relative; z-index:2; padding:36px 80px; height:100%; display:grid; grid-template-rows:auto 1fr; }
.eyebrow { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--accent); margin-bottom:6px; }
h2 { font-size:26px; font-weight:700; margin-bottom:3px; font-family:'Georgia',serif; }
.subtitle { font-size:12px; color:var(--text-muted); margin-bottom:6px; font-style:italic; }
#bubbleChart { width:100%; height:100%; }
.accent-line { position:absolute; top:0; left:0; width:100%; height:1px; z-index:3; background:linear-gradient(90deg,var(--accent),transparent); }
</style>

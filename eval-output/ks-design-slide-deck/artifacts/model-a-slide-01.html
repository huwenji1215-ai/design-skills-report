<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>AI Agent 企业应用实践 — 封面</title>
<style>
/* ===== Design Tokens — Palette A: 企业科技蓝 ===== */
:root {
  --bg: #050d1a;
  --container: #0a1628;
  --container-2: #0f1f38;
  --accent: #2563eb;
  --accent-soft: rgba(37,99,235,0.12);
  --text-primary: #f0f6ff;
  --text-secondary: #93b4d4;
  --text-muted: #4a6fa5;
  --border: rgba(37,99,235,0.25);
  --shadow: rgba(37,99,235,0.3);
  --radius: 10px;
  --font: -apple-system,'PingFang SC','Helvetica Neue',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:1280px;height:720px;overflow:hidden;
  background:var(--bg);font-family:var(--font);
  color:var(--text-primary);
  background-image: url('model-a-slide01-bg.jpg');
  background-size: cover;
  background-position: center;
}
[contenteditable]{outline:none;cursor:text;transition:outline 0.15s}
[contenteditable]:hover{outline:1px dashed var(--accent);border-radius:3px}
[contenteditable]:focus{outline:2px solid var(--accent);border-radius:3px;background:var(--accent-soft)}
.slide-number{position:absolute;bottom:16px;right:24px;font-size:13px;color:var(--text-muted);font-variant-numeric:tabular-nums}

/* Grid lines decoration */
.grid-deco{position:absolute;inset:0;background-image:linear-gradient(rgba(37,99,235,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,235,0.06) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}

/* Layout: full-width cover */
.cover-wrap{
  position:relative;width:100%;height:100%;
  display:flex;flex-direction:column;
  padding:64px 80px;
  justify-content:center;
}
.eyebrow{
  font-size:11px;letter-spacing:4px;text-transform:uppercase;
  color:var(--accent);margin-bottom:20px;
  display:flex;align-items:center;gap:10px;
}
.eyebrow::before{content:'';display:inline-block;width:24px;height:2px;background:var(--accent)}
.cover-title{
  font-size:58px;font-weight:900;line-height:1.1;
  color:var(--text-primary);
  margin-bottom:24px;max-width:680px;
}
.cover-title span{color:var(--accent)}
.cover-subtitle{
  font-size:20px;color:var(--text-secondary);
  line-height:1.5;max-width:560px;margin-bottom:48px;
}
.cover-meta{
  display:flex;align-items:center;gap:32px;
  padding-top:24px;border-top:1px solid var(--border);
}
.meta-item{font-size:13px;color:var(--text-muted)}
.meta-item strong{display:block;color:var(--text-secondary);font-size:14px;margin-bottom:2px}

/* Right visual accent */
.right-accent{
  position:absolute;right:80px;top:50%;transform:translateY(-50%);
  width:380px;height:380px;
}
.orbit{
  position:absolute;border-radius:50%;border:1px solid rgba(37,99,235,0.2);
}
.orbit-1{width:380px;height:380px;top:0;left:0;animation:spin 20s linear infinite}
.orbit-2{width:280px;height:280px;top:50px;left:50px;animation:spin 15s linear infinite reverse}
.orbit-3{width:180px;height:180px;top:100px;left:100px;animation:spin 10s linear infinite}
.center-node{
  position:absolute;width:80px;height:80px;
  background:var(--accent);border-radius:50%;
  top:150px;left:150px;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;box-shadow:0 0 40px var(--shadow);
}
.orbit-dot{
  position:absolute;width:10px;height:10px;
  background:var(--accent);border-radius:50%;
  box-shadow:0 0 12px var(--accent);
}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="grid-deco"></div>
<div style="position:absolute;inset:0;background:rgba(5,13,26,0.68);pointer-events:none;z-index:0"></div>

<div class="cover-wrap">
  <div class="eyebrow" contenteditable="true">Enterprise AI · 企业智能化白皮书 2025</div>
  <h1 class="cover-title" contenteditable="true">
    AI Agent<br>在企业中的<br><span>应用实践</span>
  </h1>
  <p class="cover-subtitle" contenteditable="true">
    从实验性探索到规模化落地——<br>解构 AI Agent 如何重塑企业工作流
  </p>
  <div class="cover-meta">
    <div class="meta-item"><strong contenteditable="true">快手技术研究院</strong><span contenteditable="true">出品方</span></div>
    <div class="meta-item"><strong contenteditable="true">2025 Q2</strong><span contenteditable="true">发布时间</span></div>
    <div class="meta-item"><strong contenteditable="true">8 张</strong><span contenteditable="true">演示页数</span></div>
  </div>
</div>

<!-- Right orbital animation -->
<div class="right-accent">
  <div class="orbit orbit-1"></div>
  <div class="orbit orbit-2"></div>
  <div class="orbit orbit-3"></div>
  <div class="center-node">🤖</div>
  <div class="orbit-dot" style="top:0;left:189px"></div>
  <div class="orbit-dot" style="top:190px;left:0"></div>
  <div class="orbit-dot" style="top:100px;left:240px"></div>
</div>

<div class="slide-number" contenteditable="false">1 / 8</div>
</body>
</html>

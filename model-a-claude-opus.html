<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>情绪记录 - 今天感觉怎么样</title>
<style>
  :root {
    /* 色彩系统 - 暖色调 */
    --color-primary: #FF8A65;
    --color-primary-dark: #E8684A;
    --color-primary-light: #FFD4C4;
    --color-secondary: #FFB74D;
    --color-accent: #F9A825;

    /* 中性色 */
    --color-bg: #FFF8F3;
    --color-bg-card: #FFFFFF;
    --color-surface: #FFF1E8;
    --color-border: #F3E0D3;

    /* 文字色 - 满足WCAG AA对比度 */
    --color-text-primary: #2B1810;    /* 对比度 15.8:1 */
    --color-text-secondary: #5C4A3F;  /* 对比度 7.8:1 */
    --color-text-tertiary: #8A7668;   /* 对比度 4.7:1 */
    --color-text-inverse: #FFFFFF;

    /* 间距系统 - 8px 基准 */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --space-8: 32px;
    --space-10: 40px;
    --space-12: 48px;

    /* 字号层级 */
    --font-title: 28px;
    --font-subtitle: 16px;
    --font-body: 14px;
    --font-caption: 12px;
    --font-emoji: 36px;

    /* 圆角 */
    --radius-sm: 12px;
    --radius-md: 16px;
    --radius-lg: 20px;
    --radius-full: 999px;

    /* 阴影 */
    --shadow-sm: 0 2px 8px rgba(232, 104, 74, 0.08);
    --shadow-md: 0 4px 16px rgba(232, 104, 74, 0.12);
    --shadow-lg: 0 8px 24px rgba(232, 104, 74, 0.18);

    /* 过渡动画 */
    --transition-fast: 150ms ease;
    --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-slow: 350ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #EDE4DB;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    color: var(--color-text-primary);
    -webkit-font-smoothing: antialiased;
  }

  .phone {
    width: 390px;
    min-height: 100vh;
    background: var(--color-bg);
    background-image:
      radial-gradient(circle at 10% 0%, rgba(255, 183, 77, 0.15) 0%, transparent 40%),
      radial-gradient(circle at 90% 100%, rgba(255, 138, 101, 0.12) 0%, transparent 40%);
    position: relative;
    overflow: hidden;
  }

  /* 状态栏 */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: var(--space-3) var(--space-6);
    font-size: var(--font-body);
    font-weight: 600;
    color: var(--color-text-primary);
  }

  .status-icons {
    display: flex;
    gap: var(--space-1);
    font-size: var(--font-caption);
  }

  /* 顶部导航 */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: var(--space-2) var(--space-6) var(--space-4);
  }

  .nav-btn {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-full);
    background: var(--color-bg-card);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: var(--color-text-primary);
    box-shadow: var(--shadow-sm);
    transition: all var(--transition-base);
  }

  .nav-btn:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }

  .nav-btn:active {
    transform: scale(0.95);
  }

  /* 头部问候区 */
  .header {
    padding: var(--space-6) var(--space-6) var(--space-8);
  }

  .date {
    font-size: var(--font-body);
    color: var(--color-text-tertiary);
    margin-bottom: var(--space-2);
    font-weight: 500;
  }

  .greeting {
    font-size: var(--font-title);
    font-weight: 700;
    color: var(--color-text-primary);
    line-height: 1.3;
    margin-bottom: var(--space-3);
    letter-spacing: -0.5px;
  }

  .greeting .highlight {
    color: var(--color-primary-dark);
    position: relative;
  }

  .subtitle {
    font-size: var(--font-subtitle);
    color: var(--color-text-secondary);
    line-height: 1.5;
  }

  /* 情绪网格 */
  .mood-section {
    padding: 0 var(--space-6);
  }

  .section-label {
    font-size: var(--font-body);
    font-weight: 600;
    color: var(--color-text-secondary);
    margin-bottom: var(--space-4);
    display: flex;
    align-items: center;
    gap: var(--space-2);
  }

  .section-label::before {
    content: '';
    width: 4px;
    height: 14px;
    background: var(--color-primary);
    border-radius: 2px;
  }

  .mood-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--space-3);
    margin-bottom: var(--space-8);
  }

  .mood-card {
    background: var(--color-bg-card);
    border: 2px solid transparent;
    border-radius: var(--radius-md);
    padding: var(--space-5) var(--space-2);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-2);
    transition: all var(--transition-base);
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
  }

  .mood-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--color-primary-light) 0%, transparent 100%);
    opacity: 0;
    transition: opacity var(--transition-base);
  }

  .mood-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-md);
    border-color: var(--color-primary-light);
  }

  .mood-card:active {
    transform: translateY(-2px) scale(0.98);
  }

  .mood-card.active {
    border-color: var(--color-primary);
    background: linear-gradient(135deg, #FFF4ED 0%, #FFE4D4 100%);
    box-shadow: var(--shadow-md);
  }

  .mood-card.active::before {
    opacity: 0.3;
  }

  .mood-emoji {
    font-size: var(--font-emoji);
    line-height: 1;
    transition: transform var(--transition-slow);
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.08));
    position: relative;
    z-index: 1;
  }

  .mood-card:hover .mood-emoji {
    transform: scale(1.15) rotate(-5deg);
  }

  .mood-card.active .mood-emoji {
    animation: bounce 0.6s ease;
  }

  @keyframes bounce {
    0%, 100% { transform: scale(1); }
    30% { transform: scale(1.25) rotate(-8deg); }
    60% { transform: scale(0.95) rotate(3deg); }
  }

  .mood-label {
    font-size: var(--font-body);
    font-weight: 600;
    color: var(--color-text-primary);
    position: relative;
    z-index: 1;
  }

  /* 描述卡片 */
  .description-card {
    margin: 0 var(--space-6) var(--space-8);
    padding: var(--space-5);
    background: linear-gradient(135deg, rgba(255, 183, 77, 0.12) 0%, rgba(255, 138, 101, 0.08) 100%);
    border-radius: var(--radius-md);
    border: 1px solid var(--color-border);
    display: flex;
    align-items: flex-start;
    gap: var(--space-3);
    transition: all var(--transition-base);
  }

  .description-icon {
    font-size: 20px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .description-text {
    font-size: var(--font-body);
    color: var(--color-text-secondary);
    line-height: 1.6;
  }

  .description-text strong {
    color: var(--color-text-primary);
    font-weight: 600;
  }

  /* 主按钮 */
  .action-area {
    padding: 0 var(--space-6) var(--space-8);
  }

  .btn-primary {
    width: 100%;
    height: 56px;
    background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
    color: var(--color-text-inverse);
    border: none;
    border-radius: var(--radius-full);
    font-size: var(--font-subtitle);
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-2);
    box-shadow: 0 6px 20px rgba(232, 104, 74, 0.35);
    transition: all var(--transition-base);
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
  }

  .btn-primary::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
    opacity: 0;
    transition: opacity var(--transition-base);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(232, 104, 74, 0.45);
  }

  .btn-primary:hover::after {
    opacity: 1;
  }

  .btn-primary:active {
    transform: translateY(0) scale(0.98);
    box-shadow: 0 4px 12px rgba(232, 104, 74, 0.35);
  }

  .btn-primary .arrow {
    transition: transform var(--transition-base);
  }

  .btn-primary:hover .arrow {
    transform: translateX(4px);
  }

  /* 底部提示 */
  .tip {
    text-align: center;
    font-size: var(--font-caption);
    color: var(--color-text-tertiary);
    margin-top: var(--space-4);
    line-height: 1.5;
  }

  /* Home指示条 */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: var(--color-text-primary);
    border-radius: 3px;
    opacity: 0.3;
  }
</style>
</head>
<body>
  <div class="phone">
    <!-- 状态栏 -->
    <div class="status-bar">
      <span>9:41</span>
      <span class="status-icons">📶 📡 🔋</span>
    </div>

    <!-- 顶部导航 -->
    <div class="nav">
      <button class="nav-btn" aria-label="菜单">☰</button>
      <button class="nav-btn" aria-label="历史">📊</button>
    </div>

    <!-- 头部问候 -->
    <div class="header">
      <div class="date">11月 · 星期二</div>
      <h1 class="greeting">今天感觉<span class="highlight">怎么样？</span></h1>
      <p class="subtitle">选一个最贴近此刻的情绪，记录当下的自己</p>
    </div>

    <!-- 情绪选择 -->
    <div class="mood-section">
      <div class="section-label">选择你的情绪</div>

      <div class="mood-grid">
        <div class="mood-card" data-mood="开心" data-desc="太棒了！保持这份好心情">
          <span class="mood-emoji">😊</span>
          <span class="mood-label">开心</span>
        </div>
        <div class="mood-card active" data-mood="平静" data-desc="内心如水，享受当下的宁静">
          <span class="mood-emoji">😌</span>
          <span class="mood-label">平静</span>
        </div>
        <div class="mood-card" data-mood="焦虑" data-desc="深呼吸，慢慢来，一切都会好的">
          <span class="mood-emoji">😰</span>
          <span class="mood-label">焦虑</span>
        </div>
        <div class="mood-card" data-mood="悲伤" data-desc="允许自己感受这份情绪，你并不孤单">
          <span class="mood-emoji">😢</span>
          <span class="mood-label">悲伤</span>
        </div>
        <div class="mood-card" data-mood="愤怒" data-desc="情绪需要出口，试着记录让你生气的事">
          <span class="mood-emoji">😠</span>
          <span class="mood-label">愤怒</span>
        </div>
        <div class="mood-card" data-mood="惊喜" data-desc="生活充满意外，记住这个美好时刻">
          <span class="mood-emoji">🤩</span>
          <span class="mood-label">惊喜</span>
        </div>
      </div>
    </div>

    <!-- 描述卡片 -->
    <div class="description-card">
      <span class="description-icon">✨</span>
      <p class="description-text">
        你选择了 <strong id="selectedMood">平静</strong>。<span id="moodDesc">内心如水，享受当下的宁静。</span>
      </p>
    </div>

    <!-- 主按钮 -->
    <div class="action-area">
      <button class="btn-primary">
        <span>记录心情</span>
        <span class="arrow">→</span>
      </button>
      <p class="tip">今日已记录 0 次 · 坚持记录，了解自己</p>
    </div>

    <div class="home-indicator"></div>
  </div>

  <script>
    const cards = document.querySelectorAll('.mood-card');
    const selectedMood = document.getElementById('selectedMood');
    const moodDesc = document.getElementById('moodDesc');

    cards.forEach(card => {
      card.addEventListener('click', () => {
        cards.forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        selectedMood.textContent = card.dataset.mood;
        moodDesc.textContent = card.dataset.desc + '。';
      });
    });
  </script>
</body>
</html>
```
